<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>16 Personalidades AI — Test MBTI en Español</title>
    <meta name="description" content="Descubre tu tipo de personalidad MBTI con análisis de IA. Compatibilidad, atracción, funciones cognitivas y fortalezas relacionales. 60 preguntas · Resultados inmediatos." />

    <!-- Open Graph / Facebook -->

    <meta property="og:description" content="Descubre tu tipo MBTI con análisis de IA personalizado. Compatibilidad, atracción, funciones cognitivas y más." />
    <meta property="og:image" content="https://16personalidades.app/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://16personalidades.app/" />
    <meta name="twitter:title" content="16 Personalidades AI — Test MBTI en Español" />
    <meta name="twitter:description" content="Descubre tu tipo MBTI con análisis de IA personalizado. Compatibilidad, atracción, funciones cognitivas y más." />
    <meta name="twitter:image" content="https://16personalidades.app/og-image.png" />

    <!-- SEO -->
    <meta name="keywords" content="test MBTI, personalidad, tipos de personalidad, MBTI español, compatibilidad, funciones cognitivas, introverted, extroverted" />

    <link rel="canonical" href="https://16personalidades.app/" />

    <!-- Favicon placeholder -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0a0a0a; color: #fff; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #111; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
      button { font-family: inherit; }
      #root { min-height: 100vh; }

      /* ── Global animations ── */
      @keyframes hexSpin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes hexPulse {
        0%, 100% { opacity: 0.7; filter: drop-shadow(0 0 4px #A78BFA66); }
        50%       { opacity: 1;   filter: drop-shadow(0 0 12px #A78BFA); }
      }
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }
      @keyframes dots {
        0%,20%  { content: '.';   }
        40%,60% { content: '..';  }
        80%,100%{ content: '...'; }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes gradientShift {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* ── Button micro-interactions ── */
      .btn-primary {
        transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      }
      .btn-primary:hover {
        transform: translateY(-1px) scale(1.02);
        filter: brightness(1.12);
        box-shadow: 0 4px 20px rgba(108,99,255,0.35);
      }
      .btn-primary:active {
        transform: scale(0.97);
        filter: brightness(0.92);
      }
      .btn-secondary {
        transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }
      .btn-secondary:hover {
        transform: translateY(-1px);
        background: #1a1a1a !important;
        color: #ccc !important;
        border-color: #333 !important;
      }
      .btn-secondary:active {
        transform: scale(0.97);
      }

      /* ── Card hover elevation ── */
      .card-hover {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .card-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      }

      /* ── Shimmer badge ── */
      .shimmer-text {
        background: linear-gradient(90deg, #A78BFA, #22D3EE, #A78BFA);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer 3s linear infinite;
      }

      /* ── Fade up entrance ── */
      .fade-up {
        animation: fadeUp 0.5s ease forwards;
      }

      /* ── Tab hover ── */
      .tab-btn {
        transition: all 0.18s ease;
      }
      .tab-btn:hover:not(.tab-active) {
        background: #1a1a1a !important;
        color: #888 !important;
      }

      /* ── Mobile ── */
      @media (max-width: 600px) {
        /* Nav */
        .land-nav { padding: 0.7rem 1rem !important; }
        .land-nav-brand span.brand-name { display: none; }

        /* Hero */
        .land-hero { padding: 3.5rem 1.25rem 2.5rem !important; }
        .land-hero-actions { flex-direction: column; align-items: stretch !important; }
        .land-hero-actions .btn-primary { text-align: center; }
        .land-hero-meta { display: none !important; }
        .land-stats { gap: 1.25rem !important; margin-top: 2rem !important; }

        /* Type pills — scroll horizontal */
        .land-pills { flex-wrap: nowrap !important; overflow-x: auto; padding-bottom: 0.5rem; justify-content: flex-start !important; }
        .land-pills::-webkit-scrollbar { display: none; }

        /* Features grid → 1 col */
        .land-features-grid { grid-template-columns: 1fr !important; }

        /* How it works → stack */
        .land-how-grid { grid-template-columns: 1fr !important; gap: 0.5rem !important; }

        /* Testimonials → 1 col */
        .land-testimonials-grid { grid-template-columns: 1fr !important; }

        /* Pricing */
        .land-pricing { padding: 3rem 1rem !important; }

        /* Test question Likert buttons — bigger touch targets */
        .likert-btn { min-width: 36px !important; max-width: 36px !important; min-height: 36px !important; }

        /* Results tabs — smaller font */
        .results-tab { font-size: 0.65rem !important; padding: 0.4rem 0.5rem !important; }

        /* Results hero padding */
        .results-hero { padding: 1.5rem 1rem 1.25rem !important; }

        /* Share modal */
        .share-modal-card { padding: 1.25rem !important; }

        /* Auth/Paywall modals */
        .modal-inner { padding: 1.5rem 1.25rem !important; max-width: 100% !important; margin: 0 0.5rem !important; }
      }

      /* Touch devices: disable hover elevation to avoid stuck states */
      @media (hover: none) {
        .card-hover:hover { transform: none; box-shadow: none; }
        .btn-primary:hover { transform: none; filter: none; box-shadow: none; }
        .btn-secondary:hover { transform: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
